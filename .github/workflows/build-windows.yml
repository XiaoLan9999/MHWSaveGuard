name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare icon
        run: |
          python tools/write_icon.py

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name MHW_Save_Guard --icon assets/app_icon.ico --add-data "assets/app_icon.ico;assets" mhw_save_guard.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHW_Save_Guard_Windows
          path: dist/MHW_Save_Guard.exe
