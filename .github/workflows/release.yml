name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.2.1"
        required: true
        default: "v0.2.1"
      prerelease:
        description: "Mark as prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name MHW_Save_Guard mhw_save_guard.py

      - name: Prepare release package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/MHW_Save_Guard.exe release/MHW_Save_Guard.exe
          Copy-Item README.md release/README.md
          Copy-Item README.zh-CN.md release/README.zh-CN.md
          Copy-Item LICENSE release/LICENSE
          Compress-Archive -Path release/* -DestinationPath MHWSaveGuard_Windows.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: MHWSaveGuard ${{ inputs.tag_name }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            MHWSaveGuard_Windows.zip
            dist/MHW_Save_Guard.exe
